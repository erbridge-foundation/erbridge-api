name: Build

on:
  push:
    branches:
      - main
      - develop
    paths:
      - ".sqlx/**"
      - "src/**"
      - "tests/**"
      - "migrations/**"
      - "hurl/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - ".github/workflows/build.yml"
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/erbridge-foundation/erbridge-api
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: erbridge_test
          POSTGRES_USER: erbridge
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erbridge -d erbridge_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cache sqlx-cli
        id: cache-sqlx
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-sqlx
          key: sqlx-cli-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Install sqlx-cli
        if: steps.cache-sqlx.outputs.cache-hit != 'true'
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Run migrations
        env:
          DATABASE_URL: postgres://erbridge:password@localhost/erbridge_test?sslmode=disable
        run: cargo sqlx migrate run

      - name: Check sqlx offline cache is up to date
        env:
          DATABASE_URL: postgres://erbridge:password@localhost/erbridge_test?sslmode=disable
        run: cargo sqlx prepare --check -- --tests

      - name: Run tests
        env:
          DATABASE_URL: postgres://erbridge:password@localhost/erbridge_test?sslmode=disable
        run: cargo test

  hurl:
    name: Hurl
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: erbridge_test
          POSTGRES_USER: erbridge
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erbridge -d erbridge_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cache sqlx-cli
        id: cache-sqlx
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-sqlx
          key: sqlx-cli-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Install sqlx-cli
        if: steps.cache-sqlx.outputs.cache-hit != 'true'
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Run migrations
        env:
          DATABASE_URL: postgres://erbridge:password@localhost/erbridge_test?sslmode=disable
        run: cargo sqlx migrate run

      - name: Build with dev-seed feature
        env:
          SQLX_OFFLINE: true
        run: cargo build --features dev-seed

      - name: Generate seed API keys
        run: |
          echo "DEV_SEED_ADMIN_API_KEY=erbridge_$(openssl rand -hex 16)" >> $GITHUB_ENV
          echo "DEV_SEED_USER_API_KEY=erbridge_$(openssl rand -hex 16)"  >> $GITHUB_ENV

      - name: Start server
        env:
          DATABASE_URL: postgres://erbridge:password@localhost/erbridge_test?sslmode=disable
          ENCRYPTION_SECRET: ci-test-encryption-secret-not-for-production
          APP_URL: http://localhost:8080
          ESI_CLIENT_ID: dummy-client-id
          ESI_CLIENT_SECRET: dummy-client-secret
          ERBRIDGE_ALLOW_DEV_SEED: "yes-i-know-this-is-insecure"
        run: |
          ./target/debug/erbridge-api &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          until curl -sf http://localhost:8080/api/health; do sleep 1; done

      - name: Install hurl
        uses: orhun/setup-hurl@main

      - name: Run hurl tests
        run: >-
          hurl --test
          --variable admin_api_key=${{ env.DEV_SEED_ADMIN_API_KEY }}
          --variable user_api_key=${{ env.DEV_SEED_USER_API_KEY }}
          --variable base_url=http://localhost:8080
          hurl/*.hurl

      - name: Stop server
        if: always()
        run: kill $SERVER_PID || true

  push:
    name: Push
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "tag_version=true" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "tag_version=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            VERSION=${{ steps.tag.outputs.version }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ steps.tag.outputs.tag_version == 'true' && format('{0}:{1}', env.IMAGE, steps.tag.outputs.version) || '' }}
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
